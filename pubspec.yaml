name: inhauski
description: InHausKI — Offline AI chat with on-device RAG. Fully private, GPU-accelerated.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── On-device LLM inference (llama.cpp with Metal/OpenCL GPU) ──────────────
  llama_cpp_dart: ^0.2.0

  # ── Vector store with HNSW approximate nearest-neighbor index ─────────────
  objectbox: ^4.0.0
  objectbox_flutter_libs: any

  # ── SQLite ORM for chat history and sessions ───────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: any

  # ── File I/O & storage ─────────────────────────────────────────────────────
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Document import (iOS Files app + Android Storage Access Framework) ─────
  file_picker: ^8.1.2

  # ── PDF text extraction ────────────────────────────────────────────────────
  pdfx: ^2.6.0

  # ── Model download with progress ───────────────────────────────────────────
  http: ^1.2.1

  # ── State management ───────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Internationalization (DE first, EN) ────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # ── Utilities ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3   # Lightweight key-value settings
  uuid: ^4.4.0                 # Session IDs

dev_dependencies:
  flutter_test:
    sdk: flutter
  objectbox_generator: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  generate: true   # Required for flutter_localizations ARB generation

  assets:
    - assets/models/   # Placeholder for locally-bundled model files (future)

  uses-material-design: true
